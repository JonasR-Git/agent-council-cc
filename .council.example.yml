# Copy to repo root as `.council.yml` (or `.council.json`).
# Loaded automatically by /council:* commands.

version: 1

# Optional model overrides (else ~/.codex/config.toml + ~/.grok/config.toml)
# codex_model: gpt-5.5
# grok_model: grok-4.5
# Codex effort is ignored here; set ~/.codex/config.toml model_reasoning_effort instead.
# codex_effort: xhigh
# grok_effort: high

# Default slash mode hint for humans/skills: review | deliberate
default_mode: deliberate

# Review target defaults
scope: auto
# base: main

# Per-agent command timeout.
agent_timeout_minutes: 30

# Always-on focus for this project (appended to R1 prompts)
focus: |
  Soft-delete (deletedAt), auth ownership, concurrency/TOCTOU,
  compliance exports, i18n de+en, no Prisma in edge proxy.

# Categories that need >=2-agent consensus (or human) before acting on unique findings
require_consensus_for:
  - auth
  - concurrency
  - data-loss
  - compliance
  - security

skip_paths:
  - content/blog/**
  - content/courses/**

max_turns_r1: 40
max_turns_r2: 25
deliberate_peer: true

# R2 cost controls: only critique findings of these severities ([all] = everything),
# and run critiques at a lower reasoning effort (Grok only; Codex effort is config-level).
peer_critique_severities: [P0, P1]
r2_effort: medium

# Bounded debate on contested items (0 = off, max 2). Not a live chat:
# one rebuttal per item, optionally one counter by the original critic.
debate_rounds: 0
# Let Grok authors argue in their own R1 session (real context continuity).
# Codex has no thread-precise resume; its turns stay fresh slim calls.
debate_resume: false

# /council:solve - who implements the synthesized plan (exactly one writer)
solve_writer: claude

# Verification-first: adversarially refute each P0/P1 (+ consensus) finding before
# showing it (reuses the R2 round, small context, low effort). Fewer, righter.
verify_findings: false

# Budget guard: refuse to start deliberate/solve (the expensive multi-agent modes;
# review/adversarial are not gated) when any provider's most-pressed window (5h or
# weekly) is at/above this percent. Fails CLOSED if limits cannot be read. 0 = off.
# Override per run with --force-budget. Reads the same limits as `usage --limits`
# (implies a live network call to the Claude usage endpoint).
budget_guard: 0
