# Copy to repo root as `.council.yml` (or `.council.json`).
# Loaded automatically by /council:* commands.

version: 1

# Optional model overrides (else ~/.codex/config.toml + ~/.grok/config.toml)
# codex_model: gpt-5.5
# grok_model: grok-4.5
# Codex effort is ignored here; set ~/.codex/config.toml model_reasoning_effort instead.
# codex_effort: xhigh
# grok_effort: high

# Default slash mode hint for humans/skills: review | deliberate
default_mode: deliberate

# Who reviews. Remove an agent to skip it entirely (e.g. [codex, grok] to run
# without a Claude R1 voice). Explicit --skip-codex/--skip-grok/--skip-claude
# still force-skip on top of this. Valid: claude, codex, grok.
reviewers: [claude, codex, grok]

# Claude reviewer backend:
#   session (default) - Claude's R1 findings come from the orchestrating session
#                       (the Claude you're talking to writes them first).
#   spawn             - run an INDEPENDENT `claude -p --model <model>` headless as
#                       the R1 reviewer, decoupled from the orchestrator so the
#                       session Claude can judge neutrally in Phase C. Read-only
#                       (Edit/Write/Bash disallowed). Needs the Claude CLI logged in.
claude_backend: session
# Pin the spawned reviewer's model (spawn backend only; null = CLI default).
# claude_model: claude-opus-4-8

# Review target defaults
scope: auto
# base: main

# Per-agent command timeout.
agent_timeout_minutes: 30

# Always-on focus for this project (appended to R1 prompts)
focus: |
  Soft-delete (deletedAt), auth ownership, concurrency/TOCTOU,
  compliance exports, i18n de+en, no Prisma in edge proxy.

# Categories that need >=2-agent consensus (or human) before acting on unique findings
require_consensus_for:
  - auth
  - concurrency
  - data-loss
  - compliance
  - security

skip_paths:
  - content/blog/**
  - content/courses/**

max_turns_r1: 40
max_turns_r2: 25
deliberate_peer: true

# R2 cost controls: only critique findings of these severities ([all] = everything),
# and run critiques at a lower reasoning effort (Grok only; Codex effort is config-level).
peer_critique_severities: [P0, P1]
r2_effort: medium

# Bounded debate on contested items (0 = off, max 2). Not a live chat:
# one rebuttal per item, optionally one counter by the original critic.
debate_rounds: 0
# Let Grok authors argue in their own R1 session (real context continuity).
# Codex has no thread-precise resume; its turns stay fresh slim calls.
debate_resume: false

# /council:solve - who implements the synthesized plan (exactly one writer)
solve_writer: claude

# Verification-first: adversarially refute each P0/P1 (+ consensus) finding before
# showing it (reuses the R2 round, small context, low effort). Fewer, righter.
verify_findings: false

# Budget guard: refuse to start deliberate/solve (the expensive multi-agent modes;
# review/adversarial are not gated) when any provider's most-pressed window (5h or
# weekly) is at/above this percent. Fails CLOSED if limits cannot be read. 0 = off.
# Override per run with --force-budget. Reads the same limits as `usage --limits`
# (implies a live network call to the Claude usage endpoint).
budget_guard: 0

# --------------------------------------------------------------------------
# OpenRouter — optional EXTRA seats (up to 5) that join six-eyes alongside
# the built-in Claude/Codex/Grok. Each configured model becomes its own seat:
# it finds independently, refutes, AND raises the §6 patch-gate unanimity bar
# (every configured seat must confirm a patch before auto-apply).
#
# SECURITY: the API key is read ONLY from the environment variable named below
# (default OPENROUTER_API_KEY) — NEVER from this file. This file is read from the
# (untrusted) repo, so a key here would ship your source to that key's account.
# Set the key in your environment:
#     export OPENROUTER_API_KEY=sk-or-v1-...        (bash/zsh, current shell)
#     setx OPENROUTER_API_KEY "sk-or-v1-..."        (Windows, persistent — new shells)
#     $env:OPENROUTER_API_KEY="sk-or-v1-..."        (PowerShell, current session)
# Without the key the seats are parsed but stay INACTIVE (available:false).
#
# Model entry forms (flat list — YAML nesting is not parsed):
#   - vendor/model                      → auto id  (or-vendor-model)
#   - myid=vendor/model                 → custom seat id (or-myid)
#   - myid=vendor/model@high            → + reasoning effort
# openrouter_models:
#   - tencent/hy3:free                  # a FREE model — good for a wiring test
#   - deepseek/deepseek-chat
#   - coder=qwen/qwen-2.5-coder-32b-instruct@high
openrouter_api_key_env: OPENROUTER_API_KEY
# openrouter_base_url: https://openrouter.ai/api/v1   # default; only openrouter.ai or a loopback proxy
