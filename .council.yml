# Council policy for agent-council-cc (loaded automatically by /council:* commands).

version: 1

# Pinned per-repo (matching ~/.codex/config.toml + ~/.grok/config.toml).
# Codex reasoning effort (high) comes from ~/.codex/config.toml model_reasoning_effort.
# If the Grok login temporarily loses a pinned model, runGrokStructured retries
# once with CLI defaults instead of failing the round.
codex_model: gpt-5.6-sol
grok_model: grok-4.5
grok_effort: high
# Claude seat: spawn an independent Fable 5 reviewer (buildClaudeArgs defaults --effort xhigh) instead of
# the driving session — so the autonomous audit loop gets a real 6-eyes Claude seat.
claude_backend: spawn
claude_model: claude-fable-5

# Default slash mode hint for humans/skills: review | deliberate
default_mode: deliberate

# Review target defaults
scope: auto

# Always-on focus for this project (appended to R1 prompts)
focus: |
  Node ESM plugin scripts: cross-platform correctness (Windows paths,
  quoting/escaping when spawning codex/grok CLIs), child-process error
  handling and timeouts, background-job state consistency under
  concurrent runs, robust JSON parsing of CLI output, and consistency
  between command markdown, prompts, and findings.schema.json.

# Categories that need >=2-agent consensus (or human) before acting on unique findings
require_consensus_for:
  - security
  - concurrency
  - data-loss

max_turns_r1: 80
max_turns_r2: 50
deliberate_peer: true

# xhigh reviews of large diffs regularly exceed 30min (observed: codex timeout in acceptance run)
agent_timeout_minutes: 90

# OpenRouter extra seats (join six-eyes + raise the §6 bar). The API key is read ONLY
# from $OPENROUTER_API_KEY — never from this file. Without the key these stay inactive.
# Add up to 5. Default seat: deepseek/deepseek-v4-flash — verified fast (16-31s full
# JSON verdict, ~$0.09/M, 1M ctx). Avoid free tiers like tencent/hy3:free: deprioritised
# and slow (~32s for a few sentences), so large design verdicts blow the 120s timeout.
openrouter_api_key_env: OPENROUTER_API_KEY
openrouter_models:
  - deepseek/deepseek-v4-flash
  # - tencent/hy3:free   # FREE, but too slow for large verdicts (times out)
  # - coder=qwen/qwen-2.5-coder-32b-instruct@high

# Run-behavior DEFAULTS for `audit fix` (flag-reduction). With this block a BARE `audit fix` runs
# the full autonomous profile below — no long flag list needed. Every CLI flag is OVERRIDE-ONLY:
# precedence is explicit flag > fix.<key> > built-in default. Turn a config-true OFF for one run
# with --no-<flag> (e.g. `audit fix --no-deep`, `audit fix --no-structure-auto-apply`).
# NOTE (Appendix D — consent containment): the auto-apply CONSENTS (structure_auto_apply /
# sensitive_auto_apply) are DELIBERATELY NOT in this tracked file — a consent here would spread to
# every clone/fork/PR-checkout and let a bare `fix` auto-apply WRITES with no consent from THAT
# operator. They live ONLY in a gitignored `.council.local.yml` (consents + a trust_fingerprint that
# must match this repo's git origin) that is acknowledged once per clone with `fix --acknowledge-consents`
# — and a git-TRACKED .council.local.yml is REFUSED (a force-added consent file is an attack vector).
# A tracked fix.structure_auto_apply/sensitive_auto_apply here is IGNORED + warned. This repo ships a
# local `.council.local.yml` for the maintainer; a fresh clone stays propose-only until it creates its
# own + acknowledges.
fix:
  loop: true
  deep: true
  epoch_sweep: true
  per_tier: true                 # friendly inverse of `flat` (per-tier convergence is the default)
  supervise: true
  autonomy: aggressive
  retry_on_limit: true
  usage_ceiling: 90/90/90
  pause_at_5h: auto:90
  max_passes: 100
  budget: 2000
