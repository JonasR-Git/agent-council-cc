# Council policy for agent-council-cc (loaded automatically by /council:* commands).

version: 1

# Pinned per-repo (matching ~/.codex/config.toml + ~/.grok/config.toml).
# Codex reasoning effort (xhigh) comes from ~/.codex/config.toml model_reasoning_effort.
# If the Grok login temporarily loses a pinned model, runGrokStructured retries
# once with CLI defaults instead of failing the round.
codex_model: gpt-5.6-sol
grok_model: grok-4.5
grok_effort: high

# Default slash mode hint for humans/skills: review | deliberate
default_mode: deliberate

# Review target defaults
scope: auto

# Always-on focus for this project (appended to R1 prompts)
focus: |
  Node ESM plugin scripts: cross-platform correctness (Windows paths,
  quoting/escaping when spawning codex/grok CLIs), child-process error
  handling and timeouts, background-job state consistency under
  concurrent runs, robust JSON parsing of CLI output, and consistency
  between command markdown, prompts, and findings.schema.json.

# Categories that need >=2-agent consensus (or human) before acting on unique findings
require_consensus_for:
  - security
  - concurrency
  - data-loss

max_turns_r1: 80
max_turns_r2: 50
deliberate_peer: true

# xhigh reviews of large diffs regularly exceed 30min (observed: codex timeout in acceptance run)
agent_timeout_minutes: 90

# OpenRouter extra seats (join six-eyes + raise the §6 bar). The API key is read ONLY
# from $OPENROUTER_API_KEY — never from this file. Without the key these stay inactive.
# Add up to 5. Verified working end-to-end with tencent/hy3:free (a free model).
openrouter_api_key_env: OPENROUTER_API_KEY
openrouter_models:
  - tencent/hy3:free
  # - deepseek/deepseek-chat
  # - coder=qwen/qwen-2.5-coder-32b-instruct@high
